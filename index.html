<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I'm Sorry ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #6a0dad, #c77dff);
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    .letter {
      max-width: 600px;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .images {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .heart-frame {
      width: 150px;
      height: 150px;
      position: relative;
      clip-path: path("M75 130 L20 75 A30 30 0 1 1 75 35 A30 30 0 1 1 130 75 Z");
      overflow: hidden;
    }

    .heart-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      margin: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    #yesBtn {
      background-color: #9d4edd;
      color: white;
    }

    #noBtn {
      background-color: #ff4d6d;
      color: white;
      position: absolute;
    }

  </style>
</head>
<body>

  <h1>I'm Really Sorry 💜</h1>

  <div class="letter">
    <p>
      My love, I know I messed up and I'm truly sorry. You mean everything to me and it hurts knowing I hurt you.
      I never want to lose you. Please forgive me and let's fix this together. 💜
    </p>
  </div>

  <div class="images">
    <div class="heart-frame">
      <img src="ali.jpg" alt="pic1">
    </div>
    <div class="heart-frame">
      <img src="mela.jpg" alt="pic2">
    </div>
  </div>

  <div class="buttons">
    <button id="yesBtn" onclick="forgive()">Yes 💜</button>
    <button id="noBtn">No 😢</button>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");

    document.addEventListener("mousemove", (e) => {
      const rect = noBtn.getBoundingClientRect();
      const distance = Math.hypot(e.clientX - rect.left, e.clientY - rect.top);

      if (distance < 100) {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
      }
    });

    function forgive() {
      document.body.innerHTML = "<h1>Thank you for forgiving me 💜 I love you so much ❤️</h1>";
    }
  </script>

</body>
</html>
